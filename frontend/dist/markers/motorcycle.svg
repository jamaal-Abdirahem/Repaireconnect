<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="mcBody" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#6366f1"/>
      <stop offset="1" stop-color="#312e81"/>
    </linearGradient>
    <linearGradient id="mcTank" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#e5e7eb"/>
      <stop offset="1" stop-color="#9ca3af"/>
    </linearGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="32" cy="54" rx="20" ry="3.5" fill="#000" opacity="0.18"/>

  <!-- wheels -->
  <circle cx="18" cy="44" r="7" fill="#020617"/>
  <circle cx="46" cy="44" r="7" fill="#020617"/>
  <circle cx="18" cy="44" r="3" fill="#e5e7eb"/>
  <circle cx="46" cy="44" r="3" fill="#e5e7eb"/>

  <!-- frame -->
  <path d="M18 44l8-10h9l5 6" fill="none" stroke="#9ca3af" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>

  <!-- seat and tank -->
  <path d="M22 30h10c2 0 3.5.6 4.6 1.7L39 34h-9.5z" fill="url(#mcBody)"/>
  <path d="M24 27c.7-1.8 2.1-3 3.8-3h6.5c1.2 0 2.3.5 3 1.4l.9 1.1H24z" fill="url(#mcTank)"/>

  <!-- handle bar and front fork -->
  <path d="M37 26l5-4" stroke="#9ca3af" stroke-width="2.6" stroke-linecap="round"/>
  <path d="M40 30l4 8" stroke="#9ca3af" stroke-width="2.6" stroke-linecap="round"/>

  <!-- headlight -->
  <circle cx="49" cy="30" r="3" fill="#fee2e2" stroke="#f97316" stroke-width="1"/>
</svg>