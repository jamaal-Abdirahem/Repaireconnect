<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="lorryCab" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#3b82f6"/>
      <stop offset="1" stop-color="#1d4ed8"/>
    </linearGradient>
    <linearGradient id="lorryBox" x1="0" x2="1" y1="0" y2="1">
      <stop offset="0" stop-color="#f3f4f6"/>
      <stop offset="1" stop-color="#9ca3af"/>
    </linearGradient>
    <radialGradient id="lorryGlass" cx="0.5" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#e5f2ff"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </radialGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="30" cy="54" rx="22" ry="4" fill="#000" opacity="0.18"/>

  <!-- cargo box -->
  <rect x="6" y="22" width="30" height="18" rx="2.5" fill="url(#lorryBox)"/>
  <rect x="6" y="22" width="30" height="4" rx="2.5" fill="#e5e7eb" opacity="0.9"/>
  <path d="M10 30h22" stroke="#d1d5db" stroke-width="1.4"/>

  <!-- cab -->
  <path d="M34 24c0-1.7 1.3-3 3-3h6.5c1.2 0 2.4.6 3.1 1.6l3.4 5c.6.9 1 2 .9 3.1l-.4 7.3c-.1 1.9-1.7 3.4-3.6 3.4H34z" fill="url(#lorryCab)"/>

  <!-- windshield -->
  <path d="M37 24h6.2c.9 0 1.7.4 2.2 1.1l2.2 3.2H37z" fill="url(#lorryGlass)"/>

  <!-- front light -->
  <rect x="45" y="33" width="4" height="3.5" rx="1" fill="#fbbf24"/>

  <!-- wheels -->
  <circle cx="18" cy="46" r="6.5" fill="#020617"/>
  <circle cx="40" cy="46" r="6.5" fill="#020617"/>
  <circle cx="18" cy="46" r="3" fill="#e5e7eb"/>
  <circle cx="40" cy="46" r="3" fill="#e5e7eb"/>
</svg>