<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="busBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#facc15"/>
      <stop offset="1" stop-color="#b45309"/>
    </linearGradient>
    <radialGradient id="busGlass" cx="0.5" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#fefce8"/>
      <stop offset="1" stop-color="#fecaca"/>
    </radialGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="32" cy="54" rx="22" ry="4" fill="#000" opacity="0.18"/>

  <!-- main body -->
  <rect x="8" y="22" width="48" height="18" rx="4" fill="url(#busBody)"/>
  <rect x="8" y="22" width="48" height="5" rx="4" fill="#facc15" opacity="0.9"/>

  <!-- windows -->
  <rect x="12" y="24" width="9" height="8" rx="1.5" fill="url(#busGlass)"/>
  <rect x="23" y="24" width="9" height="8" rx="1.5" fill="url(#busGlass)"/>
  <rect x="34" y="24" width="9" height="8" rx="1.5" fill="url(#busGlass)"/>
  <rect x="45" y="24" width="7" height="8" rx="1.5" fill="url(#busGlass)"/>

  <!-- door line -->
  <path d="M44 24v16" stroke="#f97316" stroke-width="1.2"/>

  <!-- wheels -->
  <circle cx="20" cy="46" r="6.5" fill="#020617"/>
  <circle cx="44" cy="46" r="6.5" fill="#020617"/>
  <circle cx="20" cy="46" r="3" fill="#e5e7eb"/>
  <circle cx="44" cy="46" r="3" fill="#e5e7eb"/>
</svg>