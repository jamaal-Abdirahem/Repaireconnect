<svg xmlns="http://www.w3.org/2000/svg" width="64" height="64" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="carBody" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#ff5b5b"/>
      <stop offset="1" stop-color="#b0121b"/>
    </linearGradient>
    <linearGradient id="carRoof" x1="0" x2="0" y1="0" y2="1">
      <stop offset="0" stop-color="#fee2e2"/>
      <stop offset="1" stop-color="#fecaca"/>
    </linearGradient>
    <radialGradient id="carGlass" cx="0.5" cy="0.3" r="0.9">
      <stop offset="0" stop-color="#e5f4ff"/>
      <stop offset="1" stop-color="#60a5fa"/>
    </radialGradient>
  </defs>

  <!-- shadow -->
  <ellipse cx="32" cy="54" rx="22" ry="4" fill="#000" opacity="0.18"/>

  <!-- main body -->
  <path d="M10 34c0-2 1.2-3.8 3-4.6l6.5-3.1C21 25 23 24 25.4 24h9.2c2.4 0 4.4 1 5.9 2.3l6.5 3.1c1.8.8 3 2.6 3 4.6v7c0 2.2-1.8 4-4 4H14c-2.2 0-4-1.8-4-4z" fill="url(#carBody)"/>

  <!-- roof / cabin -->
  <path d="M20 24.5c.6-2.8 2.7-5 5.5-5h13c2.8 0 4.9 2.2 5.5 5l1.2 6H18.8z" fill="url(#carRoof)"/>

  <!-- windows -->
  <path d="M22 25h8.5c.8 0 1.4.5 1.7 1.3l1.2 3.7H21z" fill="url(#carGlass)" opacity="0.95"/>
  <path d="M33.5 25H42c.8 0 1.4.5 1.7 1.3l1 3.4h-11z" fill="url(#carGlass)" opacity="0.95"/>

  <!-- front light -->
  <rect x="46" y="34" width="4" height="4" rx="1" fill="#fde68a"/>

  <!-- wheels -->
  <g fill="none" stroke-linecap="round" stroke-linejoin="round">
    <circle cx="20" cy="46" r="7" fill="#111827"/>
    <circle cx="44" cy="46" r="7" fill="#111827"/>
    <circle cx="20" cy="46" r="3" fill="#e5e7eb"/>
    <circle cx="44" cy="46" r="3" fill="#e5e7eb"/>
  </g>

  <!-- small highlight -->
  <path d="M14 37h12" stroke="#fecaca" stroke-width="1.6" stroke-linecap="round" opacity="0.8"/>
</svg>